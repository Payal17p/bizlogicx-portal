services:
  - type: web
    name: bizlogicx-portal
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: bizlogicx
      - key: JWT_SECRET
        sync: false
