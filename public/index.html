<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biz LogicX Portal</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Biz LogicX • Shipment Management</p>
          <h1>Modern shipment booking with secure user access</h1>
          <p class="subtext">Login, create shipments, and keep every user’s data separate.</p>
        </div>
        <div id="authCard" class="card auth-card"></div>
      </header>

      <main id="mainContent" class="hidden">
        <section class="card">
          <div class="section-header">
            <div>
              <p class="eyebrow">New Shipment</p>
              <h2>Booking form</h2>
            </div>
            <button id="logoutBtn" class="ghost-btn">Logout</button>
          </div>

          <form id="shipmentForm" class="grid-form">
            <label>
              Booking Date
              <input name="bookingDate" type="date" required />
            </label>
            <label>
              Direction
              <select name="direction">
                <option value="export">Export</option>
                <option value="import">Import</option>
              </select>
            </label>
            <label>
              Origin Country
              <input name="originCountry" value="India" />
            </label>
            <label>
              Origin Port
              <input name="originPort" placeholder="Nhava Sheva" />
            </label>
            <label>
              Destination Country
              <input name="destCountry" placeholder="UAE" />
            </label>
            <label>
              Destination Port
              <input name="destPort" placeholder="Jebel Ali" />
            </label>
            <label>
              Shipper Name
              <input name="shipperName" required />
            </label>
            <label>
              Consignee
              <input name="consignee" required />
            </label>
            <label>
              Nature
              <select name="nature">
                <option>Commercial</option>
                <option>Sample</option>
                <option>Documents</option>
              </select>
            </label>
            <label>
              Transport Mode
              <select name="transportMode">
                <option value="air">Air</option>
                <option value="sea">Sea</option>
              </select>
            </label>
            <label>
              Carrier
              <input name="carrier" value="UPS" />
            </label>
            <label>
              Service
              <input name="service" value="Express" />
            </label>
            <label>
              HAWB
              <input name="hawb" />
            </label>
            <label>
              MAWB
              <input name="mawb" />
            </label>
            <label>
              Invoice No
              <input name="invoiceNo" />
            </label>
            <label>
              Invoice Date
              <input name="invoiceDate" type="date" />
            </label>
            <label>
              Invoice Total Value
              <input name="invoiceTotalValue" />
            </label>
            <label>
              Currency
              <select name="invoiceCurrency">
                <option value="USD">USD</option>
                <option value="INR">INR</option>
                <option value="EUR">EUR</option>
              </select>
            </label>
            <label>
              Exchange Rate
              <input name="exchangeRate" />
            </label>

            <div class="full-span">
              <h3>Packages</h3>
              <div id="packagesContainer"></div>
              <button type="button" id="addPackageBtn" class="secondary-btn">+ Add package</button>
            </div>

            <label class="full-span">
              Remarks
              <textarea name="remarks" rows="4"></textarea>
            </label>

            <div class="full-span actions">
              <button type="submit" class="primary-btn">Save Shipment</button>
            </div>
          </form>
        </section>

        <section class="card">
          <div class="section-header">
            <div>
              <p class="eyebrow">Saved Shipments</p>
              <h2>Your shipment ledger</h2>
            </div>
          </div>
          <div id="shipmentsList" class="shipment-list"></div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
